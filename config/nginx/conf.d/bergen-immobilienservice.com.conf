# FILE: config/nginx/conf.d/bergen-immobilienservice.com.conf
# DATE: 2026-05-12
# PURPOSE: Production Bergen site with HTTPS and non-www canonical redirect.

server {
    listen 80;
    listen [::]:80;
    server_name bergen-immobilienservice.com www.bergen-immobilienservice.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://bergen-immobilienservice.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.bergen-immobilienservice.com;

    ssl_certificate     /etc/letsencrypt/live/bergen-immobilienservice.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bergen-immobilienservice.com/privkey.pem;

    return 301 https://bergen-immobilienservice.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bergen-immobilienservice.com;

    ssl_certificate     /etc/letsencrypt/live/bergen-immobilienservice.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bergen-immobilienservice.com/privkey.pem;

    client_max_body_size 20m;

    location ~* \.php(?:$|/) { return 444; }
    location ~ /\.(?!well-known) { return 444; }

    location ^~ /static/ {
        alias /app/bergen_app/static_collected/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location ^~ /media/ {
        proxy_pass http://127.0.0.1:18005;
        include /etc/nginx/includes/proxy_common.conf;
    }

    location / {
        proxy_pass http://127.0.0.1:18005;
        include /etc/nginx/includes/proxy_common.conf;
    }
}
