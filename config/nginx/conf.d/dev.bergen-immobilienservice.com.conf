# FILE: config/nginx/conf.d/dev.bergen-immobilienservice.com.conf
# DATE: 2026-05-12
# PURPOSE: Dev Bergen site via Django runserver.

server {
    listen 80;
    listen [::]:80;
    server_name dev.bergen-immobilienservice.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dev.bergen-immobilienservice.com;

    ssl_certificate     /etc/letsencrypt/live/dev.bergen-immobilienservice.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.bergen-immobilienservice.com/privkey.pem;

    client_max_body_size 20m;

    location ~* \.php(?:$|/) { return 444; }
    location ~ /\.(?!well-known) { return 444; }

    location ^~ /static/ {
        proxy_pass http://127.0.0.1:18004;
        include /etc/nginx/includes/proxy_common.conf;
    }

    location ^~ /media/ {
        proxy_pass http://127.0.0.1:18004;
        include /etc/nginx/includes/proxy_common.conf;
    }

    location / {
        proxy_pass http://127.0.0.1:18004;
        include /etc/nginx/includes/proxy_common.conf;
    }
}
