# FILE: config/nginx/conf.d/dev.bergen-grand.com.conf
# DATE: 2026-05-12
# PURPOSE: Dev Bergen Grand site via Django runserver.

server {
    listen 80;
    listen [::]:80;
    server_name dev.bergen-grand.com dev.bergen-grand.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://dev.bergen-grand.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dev.bergen-grand.de;

    ssl_certificate     /etc/letsencrypt/live/dev.bergen-grand.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.bergen-grand.com/privkey.pem;

    return 301 https://dev.bergen-grand.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dev.bergen-grand.com;

    ssl_certificate     /etc/letsencrypt/live/dev.bergen-grand.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.bergen-grand.com/privkey.pem;

    client_max_body_size 20m;

    location ~* \.php(?:$|/) { return 444; }
    location ~ /\.(?!well-known) { return 444; }

    location ^~ /static/ {
        proxy_pass http://127.0.0.1:18006;
        include /etc/nginx/includes/proxy_common.conf;
    }

    location ^~ /media/ {
        proxy_pass http://127.0.0.1:18006;
        include /etc/nginx/includes/proxy_common.conf;
    }

    location / {
        proxy_pass http://127.0.0.1:18006;
        include /etc/nginx/includes/proxy_common.conf;
    }
}
