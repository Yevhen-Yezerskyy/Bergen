<div class="cookie-consent" data-cookie-banner hidden>
    <div class="cookie-consent-inner">
        <div class="cookie-consent-head">
            <p class="cookie-consent-title">Datenschutz-Einstellungen</p>
            <button type="button" class="cookie-toggle-button" data-cookie-toggle-settings aria-expanded="false">Einstellungen</button>
        </div>
        <p class="cookie-consent-text">Wir verwenden notwendige Cookies sowie optionale Dienste für Statistik und externe Medien. Sie können Ihre Auswahl jederzeit ändern.</p>
        <div class="cookie-consent-actions">
            <button type="button" class="cookie-btn cookie-btn-primary" data-cookie-accept-all>Alle akzeptieren</button>
            <button type="button" class="cookie-btn cookie-btn-neutral" data-cookie-accept-necessary>Nur notwendige</button>
            <button type="button" class="cookie-btn cookie-btn-ghost" data-cookie-close-banner>Schließen</button>
        </div>

        <div class="cookie-consent-panel" data-cookie-settings-panel hidden>
            <label class="cookie-option cookie-option-fixed">
                <input type="checkbox" checked disabled>
                <span><strong>Notwendige Cookies</strong><br>Erforderlich für Grundfunktionen der Website.</span>
            </label>

            <label class="cookie-option">
                <input type="checkbox" data-cookie-setting="analytics">
                <span><strong>Statistik</strong><br>Hilft uns, die Website-Nutzung zu verstehen und zu verbessern.</span>
            </label>

            <label class="cookie-option">
                <input type="checkbox" data-cookie-setting="external_media">
                <span><strong>Externe Medien</strong><br>Erlaubt das Laden externer Inhalte wie Karten oder eingebettete Medien.</span>
            </label>

            <div class="cookie-consent-actions cookie-consent-actions-secondary">
                <button type="button" class="cookie-btn cookie-btn-primary" data-cookie-save-selection>Auswahl speichern</button>
                <button type="button" class="cookie-btn cookie-btn-neutral" data-cookie-accept-necessary>Nur notwendige</button>
                <button type="button" class="cookie-btn cookie-btn-ghost" data-cookie-accept-all>Alle akzeptieren</button>
            </div>
        </div>
    </div>
</div>
